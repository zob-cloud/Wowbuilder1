<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Projects</title>
  <link rel="stylesheet" href="demo.css">
</head>
<body>
  <h1 style="text-align:center; margin-top:20px;">Demo Projects</h1>

  <!-- SEARCH & FILTER -->
  <div class="controls" style="text-align:center; margin:20px 0;">
    <input type="text" id="searchInput" placeholder="Search projects..." style="padding:10px; width:250px; border-radius:6px; border:none; outline:none;">
    <select id="categoryFilter" style="padding:10px; border-radius:6px; border:none; outline:none; margin-left:10px;">
      <option value="all">All Categories</option>
      <option value="portfolio">Portfolio</option>
      <option value="blog">Blog</option>
      <option value="ecommerce">E-commerce</option>
      <option value="event">Event</option>
      <option value="dashboard">Dashboard</option>
    </select>
  </div>

  <div class="demo-projects-container">
    <!-- Projects will load here -->
  </div>

  <script src="demo.js"></script>
</body>
</html>
